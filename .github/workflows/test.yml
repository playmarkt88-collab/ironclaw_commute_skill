name: Test Train Tracker

on:
  workflow_dispatch: # Позволяет запускать тест вручную по кнопке
  push:
    branches: [ "main" ] # Автоматически запускает тест при изменении кода

jobs:
  run-skill:
    runs-on: ubuntu-latest
    steps:
      - name: Скачиваем код из репозитория
        uses: actions/checkout@v4

      - name: Устанавливаем Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Устанавливаем библиотеки
        run: pip install requests

      - name: Запускаем скрипт навыка
        env:
          # Подтягиваем ключ из секретов (Шаг 1)
          YANDEX_API_KEY: ${{ secrets.YANDEX_API_KEY }}
        run: python train_tracker.py
